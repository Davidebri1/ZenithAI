kind = "mobile"
previewPath = "/"
title = "MultiAI"
version = "1.0.0"
id = "artifacts/multi-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21519

[services.development]
run = "pnpm --filter @workspace/multi-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/multi-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/multi-ai", "run", "serve" ]

[services.env]
PORT = "21519"
BASE_PATH = "/"
