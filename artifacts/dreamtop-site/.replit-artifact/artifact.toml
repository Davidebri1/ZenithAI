kind = "web"
previewPath = "/dreamtop/"
title = "Dreamtop LLC"
version = "1.0.0"
id = "artifacts/dreamtop-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dreamtop/" ]
localPort = 19752

[services.development]
run = "pnpm --filter @workspace/dreamtop-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreamtop-site", "run", "build" ]
publicDir = "artifacts/dreamtop-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19752"
BASE_PATH = "/dreamtop/"
